        function changeTextVal(obj) {
            var myVal = $(obj).val();

            //$(obj).val(myVal);
        }
        function changeCheckbox(obj) {
            var myVal = $(obj).prop('checked');
            if (myVal == true) {
                $(obj).attr("checked", "checked");
            } else {
                $(obj).removeAttr('checked');
            }
        }

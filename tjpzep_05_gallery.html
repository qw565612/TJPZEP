    <script>
        var TOKEN = '';
        var U_Permit = '';
       
        $(document).ready(function () {
            let s = location.href;
            sessionStorage.setItem("myURL", s);

            var chkURL = sessionStorage.getItem("chkURL");
            var url = parent.document.URL;

            if (chkURL == null) {
                window.location.href = './tjpzep_index.html';
                return;
            }
            if (url != chkURL) {
                window.location.href = './tjpzep_index.html';
                return;
            }

            initControll();
            getGalleryData('BASIC');
        })

        function initControll()
        { }

        function getGalleryData(GALLERY_TYPE)
        {
            var dataCard = "";
            var dataFade = "";

            var FUN_NAME = "GALLERY_QUERY";//必要參數 預存程序名稱
            var TYPE = "Q";//必要參數 類型 Q:查詢 I:新增  U:更新  L:登入取授權

            var PA = '{' +
              '"FUNCTION_NAME":"' + FUN_NAME + '","TYPE":"' + TYPE + '","PUBLIC":"1","IDX":"-999","GALLERY_TYPE":"' + GALLERY_TYPE + '"}';

            var IDXs = [];
            $.ajax({
                url: './service.ashx',
                //url: 'https://tjpzep.sinotech.com.tw/SERVICE_TJPZEP/service.ashx',
                type: 'POST',
                data: PA,
                dataType: "json",
                success: function (dataJS) {
                    console.log(dataJS);
                    var dataArray = dataJS;

                    var Message_Code = dataArray.Message[0].Message_Code;
                    var Message_Content = dataArray.Message[0].Message_Content;
                    if (Message_Code == '1') {
                        var i = 0;
                        $.each(dataArray.Data, function (idx, obj) {

                            var IDX = obj.IDX;
                            var GALLERY_TILTE = obj.GALLERY_TILTE;
                            var GALLERY_TEXT = obj.GALLERY_TEXT;
 
                            var GALLERY_FILE_NAME = obj.GALLERY_FILE_NAME;

                            i += 1;
                            dataCard +=
                                  "<div class='col-sm-6 col-lg-4 mb-4 wow zoomIn' data-wow-delay='0.1s'> " +
                                  "    <div class='card'> " +
                                  "        <a class='btn text-dark' data-bs-toggle='modal' data-bs-target='#ModalP_" + i.toString() + "'> " +
                                  "            <img src='img/" + GALLERY_FILE_NAME + "' class='img-fluid rounded-top w-100'> " +
                                  "        </a><div class='card-body'> " +
                                  "            <h5 class='card-title'>" + GALLERY_TILTE + "</h5> " +
                                  "            <p class='card-text'>" + GALLERY_TEXT + "</p>" +
                                  "        </div> " +
                                  "    </div> " +
                                  "</div> ";

                            dataFade +=
                                 " <div class='modal fade' id='ModalP_" + i.toString() + "' tabindex='-1'>" +
                                 "        <div class='modal-dialog'>" +
                                 "            <div class='modal-content'>" +
                                 "                <div class='modal-header border-0'>" +
                                 "                    <button type='button' class='btn bg-white btn-close' data-bs-dismiss='modal' aria-label='Close'></button>" +
                                 "                </div>" +
                                 "                <div class='modal-body d-flex align-items-center justify-content-center'>" +
                                 "                    <img class='img-fluid rounded-top w-100' src='img/" + GALLERY_FILE_NAME + "' alt=''>" +
                                 "                </div>" +
                                 "            </div>" +
                                 "        </div>" +
                                 "  </div>";
                            
                            
                        });
                         
                        $('#divCard').html(dataCard);
                        $('#divFade').html(dataFade);
            
                    }
                    else {
                        alert(Message_Content);
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {

                    alert("Status: " + textStatus); alert("Error: " + errorThrown);
                }


            })

        }
    </script>

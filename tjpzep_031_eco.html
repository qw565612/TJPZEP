    <script>
        var TOKEN = '';

        $(document).ready(function () {

            let s = location.href;
            sessionStorage.setItem("myURL", s);

            var chkURL = sessionStorage.getItem("chkURL");
            var url = parent.document.URL;

            if (chkURL == null) {
                window.location.href = './tjpzep_index.html';
                return;
            }
            if (url != chkURL) {
                window.location.href = './tjpzep_index.html';
                return;
            }

            initControll();
            getEcoData();
        })

        function initControll() {

        }

        function getEcoData() {
            var dataEco = "";

            var FUN_NAME = "ECO_QUERY";//必要參數 預存程序名稱
            var TYPE = "Q";//必要參數 類型 Q:查詢 I:新增  U:更新  L:登入取授權 
            var PA = '{' +
              '"FUNCTION_NAME":"' + FUN_NAME + '","TYPE":"' + TYPE + '","PUBLIC":"1"}';



            var ECO_YEAR_MONTHs = [];
            $.ajax({
                url: './service.ashx',
                //url: 'https://tjpzep.sinotech.com.tw/SERVICE_TJPZEP/service.ashx',
                type: 'POST',
                data: PA,
                dataType: "json",
                success: function (dataJS) {
                    console.log(dataJS);
                    var dataArray = dataJS;

                    var Message_Code = dataArray.Message[0].Message_Code;
                    var Message_Content = dataArray.Message[0].Message_Content;
                    if (Message_Code == '1') {
                        var i = 0;
                        $.each(dataArray.Data, function (idx, obj){
                            i += 1;
                            var ECO_YEAR_MONTH = obj.ECO_YEAR_MONTH;
                            var ECO_FILE_NAME = obj.ECO_FILE_NAME;


                            let indexECO_YEAR_MONTH = ECO_YEAR_MONTHs.indexOf(ECO_YEAR_MONTH);

                            if (indexECO_YEAR_MONTH < 0) {
                                dataEco +=
                                "<div class='mb-3 border-bottom'>" +
                                "    <p class='date mb-0'>	" + ECO_YEAR_MONTH.replace('-01T00:00:00', '') + "	</p>";

                                var dataFiles = "";
                                $.each(dataArray.Data, function (idx2, obj2) {
                                    var ECO_YEAR_MONTH2 = obj2.ECO_YEAR_MONTH;
                                    var ECO_FILE_NAME2 = obj2.ECO_FILE_NAME;
                                    var ECO_FILE_TITLE2 = obj2.ECO_FILE_TITLE;
                                    
                                    if (ECO_YEAR_MONTH == ECO_YEAR_MONTH2)
                                    {
                                        dataFiles += "<h6 class='text-white my-1'><i class='bi bi-file-earmark-arrow-down-fill pe-2'></i><a target='_blank' href='./file/" + ECO_FILE_NAME2 + "'>" + ECO_FILE_TITLE2 + "</a></h6>";
                                    }
                                });

                                dataEco += dataFiles+
                                "</div>";

                                ECO_YEAR_MONTHs.push(ECO_YEAR_MONTH);
                            }
                        })

                        $('#div_EcoData').html(dataEco);
                        
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {

                    alert("Status: " + textStatus); alert("Error: " + errorThrown);
                }
            });


        }

    </script>

    <script>
        var TOKEN = '';
        var U_Permit = '';

        $(document).ready(function () {
            let s = location.href;
            sessionStorage.setItem("myURL", s);

            var chkURL = sessionStorage.getItem("chkURL");
            var url = parent.document.URL;

            if (chkURL == null) {
                window.location.href = './tjpzep_index.html';
                return;
            }
            if (url != chkURL) {
                window.location.href = './tjpzep_index.html';
                return;
            }

            initControll();
            getEcoData();
        })

        function initControll() {

        }

        function getEcoData() {
            var dataTitle = "";
            var dataText = "";
            var dataImage = "";

            var FUN_NAME = "ORIGIN_QUERY";//必要參數 預存程序名稱
            var TYPE = "Q";//必要參數 類型 Q:查詢 I:新增  U:更新  L:登入取授權
            var PA = '{' +
              '"FUNCTION_NAME":"' + FUN_NAME + '","TYPE":"' + TYPE + '","PUBLIC":"1"}';



            var ECO_YEAR_MONTHs = [];
            $.ajax({
                url: './service.ashx',
                //url: 'https://tjpzep.sinotech.com.tw/SERVICE_TJPZEP/service.ashx',
                type: 'POST',
                data: PA,
                dataType: "json",
                success: function (dataJS) {
                    console.log(dataJS);
                    var dataArray = dataJS;

                    var Message_Code = dataArray.Message[0].Message_Code;
                    var Message_Content = dataArray.Message[0].Message_Content;
                    if (Message_Code == '1') {
                        var i = 0;
                        $.each(dataArray.Data, function (idx, obj){
                            i += 1;
                            var ORIGIN_TITLE = obj.ORIGIN_TITLE;
                            var ORIGIN_TEXT = obj.ORIGIN_TEXT;
                            var ORIGIN_IMAGE = obj.ORIGIN_IMAGE;
                            dataTitle = ORIGIN_TITLE;
                            dataText = ORIGIN_TEXT;
                            dataImage = "<img class='w-100 h-100 rounded wow zoomIn' data-wow-delay='0.9s' src='img/" + ORIGIN_IMAGE + "'>"
                        })

                        $('#oTitle').html(dataTitle);
                        $('#oText').html(dataText);
                        $('#oImage').html(dataImage);

                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {

                    alert("Status: " + textStatus); alert("Error: " + errorThrown);
                }
            });


        }

    </script>

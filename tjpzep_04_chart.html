    <script>
        var MyCategories = [];
        var MyReal = [];
        var MyPredict = [];
        var MaxMDT = '';

        var RealSchedule = 0;
        var PreSchedule = 0;
        var PieDT = '';
        var Pie_PERCENTAGE = 0;

        $(document).ready(function () {
            let s = location.href;
            sessionStorage.setItem("myURL", s);

            var chkURL = sessionStorage.getItem("chkURL");
            var url = parent.document.URL;

            if (chkURL == null) {
                window.location.href = './tjpzep_index.html';
                return;
            }
            if (url != chkURL) {
                window.location.href = './tjpzep_index.html';
                return;
            }
            initControll();
            getLineChartData();
        });


        function initControll() {

        }

        function getLineChartData() {
            MyCategories = [];
            MyReal = [];
            MyPredict = [];

            //  MyCategories = [
            //'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep',
            //'Oct', 'Nov', 'Dec'
            //  ];
            //  MyReal = [2.9, 3.6, 4.6, 4.8, 10.2, 14.5, 17.6, 16.5, 12.0, null, null, null];

            //  MyPredict = [16.0, 18.2, 23.1, 27.9, 32.2, 36.4, 39.8, 38.4, 35.5, 29.21, 22.0, 100.00];


            var FUN_NAME = "SCHEDULE_QUERY";//必要參數 預存程序名稱
            var TYPE = "Q";//必要參數 類型 Q:查詢 I:新增  U:更新  L:登入取授權
            var PA = '{' +
              '"FUNCTION_NAME":"' + FUN_NAME + '","TYPE":"' + TYPE + '","PUBLIC":"1"}';

            $.ajax({
                url: './service.ashx',
                //url: 'https://tjpzep.sinotech.com.tw/SERVICE_TJPZEP/service.ashx',
                type: 'POST',
                data: PA,
                dataType: "json",
                success: function (dataJS) {
                    console.log(dataJS);
                    var dataArray = dataJS;

                    var Message_Code = dataArray.Message[0].Message_Code;
                    var Message_Content = dataArray.Message[0].Message_Content;
                    if (Message_Code == '1') {
                        var i = 0;
                        $.each(dataArray.Data, function (idx, obj) {
                            i += 1;

                            var YEAR_MONTH = obj.YEAR_MONTH;
                            var PREDICT = obj.PREDICT;
                            var REAL = obj.REAL;

                            var MONTH_PREDICT = obj.MONTH_PREDICT;
                            var MONTH_REAL = obj.MONTH_REAL;
                            var MONTH_PERCENT = obj.MONTH_PERCENT;
                            if (i == 1) {
                                MaxMDT = obj.MaxMDT;
                                //MaxMDT = obj.MaxMDT.replace('T00:00:00', '').replace('T', ' ').substring(0, 10);
                                //MaxMDT = obj.MaxMDT.replace('T00:00:00', '').replace('T', ' ').substring(8, 10);
                                //MaxMDT = YEAR_MONTH + MaxMDT + '日';
                                 
                            }

                            if (PREDICT == "0")
                            { PREDICT = 0; }
                            else if (PREDICT == "" || PREDICT == null) {
                                PREDICT = null;
                            }
                            else { PREDICT = parseFloat(PREDICT);}

                            if (REAL == "0")
                            { REAL = 0; }
                            else if (REAL == "" || REAL == null)
                            { REAL = null; }
                            else
                            {
                                REAL = parseFloat(REAL);
                                // RealSchedule = REAL;  PreSchedule = PREDICT; PieDT = YEAR_MONTH
                            }



                            if (MONTH_PREDICT == "0")
                            { MONTH_PREDICT = 0; }
                            else if (MONTH_PREDICT == "" || MONTH_PREDICT == null) {
                                MONTH_PREDICT = null;
                            }
                            else { MONTH_PREDICT = parseFloat(MONTH_PREDICT); }

                            if (MONTH_REAL == "0")
                            { MONTH_REAL = 0; }
                            else if (MONTH_REAL == "" || MONTH_REAL == null)
                            { MONTH_REAL = null; }
                            else
                            {
                                RealSchedule = MONTH_REAL;
                                PreSchedule = MONTH_PREDICT;
                                PieDT = YEAR_MONTH;
                                Pie_PERCENTAGE = MONTH_PERCENT;
                            }




                            MyCategories.push(YEAR_MONTH);
                            MyReal.push(REAL);
                            MyPredict.push(PREDICT);
                        })
                        createLineChart();
                        createPieChart();
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {

                    alert("Status: " + textStatus); alert("Error: " + errorThrown);
                }
            });

            createLineChart();
            createPieChart();
        }

        function createLineChart() {

            Highcharts.chart('containerLine', {
                chart: {
                    type: 'spline'
                },

                credits: {
                    enabled: false
                },
                title: {
                    text: '施工期程進度'
                },
                subtitle: {
                    text: '更新日期：' + MaxMDT
                },
                xAxis: {
                    categories: MyCategories
                },
                yAxis: {
                    title: {
                        text: '進度 (%)'
                    },
                    min: 0,
                    max: 100
                },
                tooltip: {
                    crosshairs: true,
                    shared: true
                },
                plotOptions: {
                    line: {
                        dataLabels: {
                            enabled: true
                        },
                        enableMouseTracking: false
                    }
                },
                series: [{
                    name: '預計進度',
                    data: MyPredict
                }, {
                    name: '實際進度',
                    data: MyReal
                }]
            });

        }
        function createPieChart() {
            Highcharts.chart('containerPie', {

                chart: {
                    type: 'solidgauge',
                    //backgroundColor: 'transparent'
                },

                credits: {
                    enabled: false
                },

                title: {
                    text: PieDT+' 預定/實際進度'
                },

                subtitle: {
                    // text: '更新日期：2024/08/14'
                    // text: '更新日期：' + PieDT 
                    text: '預定：' + PreSchedule + '％ 實際：' + RealSchedule + '％'
                },
                //gauge 根本沒有legend，所以下面5行都是無作用的^^
                legend: {
                    align: 'center',
                    verticalAlign: 'top',
                    layout: 'vertical',
                    x: 0,
                    y: 0
                },


                pane: {
                    center: ['50%', '85%'],
                    size: '100%',
                    startAngle: -90,
                    endAngle: 90,
                    background: {
                        backgroundColor: '#2e318b',
                        borderWidth: 0,
                        innerRadius: '57%',
                        outerRadius: '103%',
                        shape: 'arc'
                    }
                },

                // the value axis
                yAxis: {
                    lineWidth: 0,
                    minorTickInterval: null,
                    min: 0,
                    max: 100,
                    tickPixelInterval: 400,
                    tickWidth: 0,
                    labels: {
                        y: 16
                    }
                },

                series: [{
                    name: '％',
                    data: [
                    //    {
                    //    name: '預定進度',
                    //    radius: 98,
                    //    innerRadius: 82,
                    //    y: PreSchedule,//9.44,
                    //    color: '#06A3DA'
                    //},
                    {
                        name: PieDT + ' 實際/預定(％)',
                        radius: 68,//78,
                        innerRadius: 92,//62,
                        y: Pie_PERCENTAGE,//91,//RealSchedule,//3.20,
                        color: '#F57E57'
                    }],
                    dataLabels: {
                        enabled: false
                    },
                    tooltip: {
                        pointFormat: '{point.name}: <b>{point.y}</b> %'
                    }
                }]
            });
        }

    </script>

    <div class="container-fluid py-5 wow fadeInUp" data-wow-delay="0.1s">
        <div class="container">
            <div class="row">
                <h2>計畫進度</h2>
                <div class="col-12 p-3 bg-light">
                    <h3>整體進度</h3>
                    <img class="w-100 rounded wow zoomIn" src="img/計畫整體進度.png">
                </div>
                <div class="col-lg-5 p-3 bg-light">
                    <h3>當月預定與實際進度</h3>
                    <p><small>以當月的實際進度作為100%(深藍色)，當月預定進度除以實際進度的比例為橘色線段，單位為%。</small></p>
                    <div id="containerPie"></div>
                </div>
                <div class="col-lg-7 p-3 bg-light">

                    <p><small>整體工程的累計進度，藍色折線為預計累計進度，紫色折線為實際累計進度，X軸單位為月份，Y軸單位為%。</small></p>

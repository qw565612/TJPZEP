    <script>
        var TOKEN = '';
        var U_Permit = '';

        $(document).ready(function () {

            let s = location.href;
            sessionStorage.setItem("myURL", s);

            var chkURL = sessionStorage.getItem("chkURL");
            var url = parent.document.URL;

            if (chkURL == null) {
                window.location.href = './tjpzep_index.html';
                return;
            }
            if (url != chkURL) {
                window.location.href = './tjpzep_index.html';
                return;
            }

            initControll();
            getContactData();
        })

        function initControll() {

        }

        function getContactData() {
            $('#div_EcoData').html("");
            var dataContact = "";
            var FUN_NAME = "CONTACT_QUERY";//必要參數 預存程序名稱
            var TYPE = "Q";//必要參數 類型 Q:查詢 I:新增  U:更新  L:登入取授權 
            var PA = '{' +
              '"FUNCTION_NAME":"' + FUN_NAME + '","TYPE":"' + TYPE + '","PUBLIC":"1"}';


            $.ajax({
                url: './service.ashx',
                //url: 'https://tjpzep.sinotech.com.tw/SERVICE_TJPZEP/service.ashx',
                type: 'POST',
                data: PA,
                dataType: "json",
                success: function (dataJS) {
                    console.log(dataJS);
                    var dataArray = dataJS;
                    var Message_Code = dataArray.Message[0].Message_Code;
                    var Message_Content = dataArray.Message[0].Message_Content;
                    
                    if (Message_Code == '1') {
                        $.each(dataArray.Data, function (idx, obj){                           
                            var C_Url = obj.C_Url;
                            var C_Image = obj.C_Image;
                            var C_Name = obj.C_Name;
                            dataContact += '<div class="col-md-4 col-12 mb-3">' +
                                '<a href="' + C_Url + '" target="_blank">' +
                                '<img class="img-fluid" alt="' + C_Name + '" src="img/' + C_Image + '" />' +
                                '</a></div>';
                        })

                        $('#div_EcoData').html(dataContact);
                        
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {

                    alert("Status: " + textStatus); alert("Error: " + errorThrown);
                }
            });


        }

    </script>

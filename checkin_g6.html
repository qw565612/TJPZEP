<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR碼簽到系統 (Google Sheets版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .config-section {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
        }

        .config-section h3 {
            color: #856404;
            margin-bottom: 15px;
        }

        .config-section.configured {
            background: #d4edda;
            border-color: #28a745;
        }

        .config-section.configured h3 {
            color: #155724;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #ddd;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            border: none;
            background: none;
            font-size: 16px;
        }

        .tab:hover {
            background: #e0e0e0;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 5px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ccc;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

            button:disabled {
                background: white;
                color: #eee;
                cursor: not-allowed;
                transform: none;
            }

        #qrcode {
            text-align: center;
            padding: 30px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-top: 20px;
        }

        #qrcode canvas {
            margin: 0 auto;
        }

        .event-list {
            list-style: none;
        }

        .event-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .event-info h3 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .event-info p {
            color: #666;
            font-size: 14px;
        }

        .event-actions button {
            margin-left: 10px;
            padding: 8px 15px;
            font-size: 14px;
        }

        #reader {
            max-width: 500px;
            margin: 20px auto;
            border: 2px solid #667eea;
            border-radius: 10px;
            overflow: hidden;
        }

        .checkin-form {
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .error-message {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 14px;
            opacity: 0.9;
        }

        .download-btn {
            background: #4caf50;
            color:white;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .container {
                border-radius: 0;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
            
            .tab {
                font-size: 14px;
                padding: 12px 5px;
            }
            
            .event-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .event-actions {
                margin-top: 10px;
                width: 100%;
            }
            
            .event-actions button {
                margin: 5px 5px 0 0;
            }
            #submitBtn {
                color:white
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>114年度鐵道橋梁統計系統<br/>教育訓練</h1>
            <p> QR碼簽到系統</p>
        </div>

        <!-- Google Apps Script 設定區-->
        <div class="config-section " id="configSection" style="display:none">
            <h3>⚙️ Google Apps Script 設定</h3>
            <div class="form-group">
                <label>Apps Script 網址</label>
                <input type="text" id="scriptUrl" placeholder="貼上 Apps Script 部署的網址">
                <small style="color: #666;">例：https://script.google.com/macros/s/AKfycby.../exec</small>
            </div>
            <button onclick="saveConfig()">儲存設定</button>
            <button onclick="testConnection()" style="background: #17a2b8; color:white; margin-left: 10px;">測試連線</button>
        </div>

        <div class="tabs">
            <button class="tab" onclick="showTab('create')" disabled>建立活動</button>
            <button class="tab active" onclick="showTab('checkin')">掃碼簽到</button>
            <button class="tab" onclick="showTab('stats')">簽到統計</button>
        </div>

        <!-- 建立活動 -->
        <div id="create" class="tab-content">
            <h2>建立新活動</h2>
            <div class="form-group">
                <label>活動名稱</label>
                <input type="text" id="eventName" placeholder="例：年終尾牙晚會">
            </div>
            <div class="form-group">
                <label>活動日期</label>
                <input type="date" id="eventDate">
            </div>
            <div class="form-group">
                <label>活動時間</label>
                <input type="time" id="eventTime">
            </div>
            <div class="form-group">
                <label>活動地點</label>
                <input type="text" id="eventLocation" placeholder="例：台北國際會議中心">
            </div>
            <div class="form-group">
                <label>備註</label>
                <textarea id="eventNote" rows="3" placeholder="其他說明..."></textarea>
            </div>
            <button onclick="createNewEvent()" id="createBtn">建立活動並產生QR碼</button>

            <div id="qrcode"></div>

            <h2 style="margin-top: 40px;">活動列表</h2>
            <div id="loadingEvents" class="loading" style="display:none;">載入中...</div>
            <ul id="eventList" class="event-list"></ul>
        </div>

        <!-- 掃碼簽到 -->
        <div id="checkin" class="tab-content active">
            <h2>掃描QR碼簽到</h2>
            <div id="reader"></div>

            <div class="checkin-form" id="checkinForm" style="display:none;">
                <h3 id="checkinEventName"></h3>
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="attendeeName" placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label>單位</label>
                    <input type="text" id="attendeeUnit" placeholder="請輸入單位">
                </div>
                <div class="form-group">
                    <label>職稱</label>
                    <input type="text" id="attendeeTitle" placeholder="請輸入職稱">
                </div>
                <button onclick="submitCheckin()" id="submitBtn" >確認簽到</button>
                <button onclick="resetScanner()" style="background: #999; color:white;margin-left: 10px;">重新掃描</button>
            </div>

            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <!-- 簽到統計 -->
        <div id="stats" class="tab-content">
            <h2>簽到統計</h2>
            <button onclick="loadStats()" style="background: #17a2b8; color:white;margin-bottom: 20px;">重新整理統計</button>

            <div class="form-group" style="display:none">
                <label>選擇活動</label>
                <select id="statsEventSelect" onchange="filterStats()">
                    <option value="">所有活動</option>
                </select>
           </div>

            <div id="loadingStats" class="loading" style="display:none;">載入中...</div>
            <div id="statsContent"></div>
        </div>
    </div>

    <script>
        let config = {
            scriptUrl: localStorage.getItem('scriptUrl') || ''
        };
        let currentEventId = null;
        let currentEvent = null;
        let html5QrcodeScanner = null;
        let allCheckins = [];
        let allEvents = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
            
            // 檢查URL參數
            const urlParams = new URLSearchParams(window.location.search);
            
            // 如果URL中有scriptUrl參數，優先使用並儲存
            if (urlParams.has('s')) {
                const urlScriptUrl = decodeURIComponent(urlParams.get('s'));
                if (urlScriptUrl) {
                    config.scriptUrl = urlScriptUrl;
                    localStorage.setItem('scriptUrl', urlScriptUrl);
                }
            }
            
            if (urlParams.has('e')) {
                try {
                    const eventData = decodeURIComponent(urlParams.get('e'));
                    const parts = eventData.split('|');
                    
                    if (parts.length >= 4) {
                        currentEvent = {
                            id: parts[0],
                            name: parts[1],
                            date: parts[2],
                            time: parts[3],
                            location: parts[4] || ''
                        };
                        currentEventId = parts[0];
                        
                        showTabByName('checkin');
                        
                        document.getElementById('checkinEventName').innerHTML = `
                            <strong>${currentEvent.name}</strong><br>
                            <small style="color: #666;">📅 ${currentEvent.date} ${currentEvent.time}${currentEvent.location ? '<br> 📍 ' + currentEvent.location : ''}</small>
                        `;
                        document.getElementById('checkinForm').style.display = 'block';
                        document.getElementById('reader').style.display = 'none';
                    }
                } catch (e) {
                    console.error('解析活動資訊失敗:', e);
                }
            } else {
                loadEventList();
            }
        });

        // 載入設定
        function loadConfig() {
            document.getElementById('scriptUrl').value = config.scriptUrl;
            
            if (config.scriptUrl) {
                document.getElementById('configSection').classList.add('configured');
                document.getElementById('configSection').querySelector('h3').innerHTML = '✅ Apps Script 已設定';
            }
        }

        // 儲存設定
        function saveConfig() {
            config.scriptUrl = document.getElementById('scriptUrl').value.trim();
            
            if (!config.scriptUrl) {
                alert('請填寫 Apps Script 網址');
                return;
            }
            
            localStorage.setItem('scriptUrl', config.scriptUrl);
            
            document.getElementById('configSection').classList.add('configured');
            document.getElementById('configSection').querySelector('h3').innerHTML = '✅ Apps Script 已設定';
            
            alert('設定已儲存！');
            testConnection();
        }

        // 測試連線
        async function testConnection() {
            if (!config.scriptUrl) {
                alert('請先設定 Apps Script 網址');
                return;
            }
            
            try {
                const response = await fetch(
                    `${config.scriptUrl}?sheet=Events`
                );
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ 連線成功！');
                    loadEventList();
                } else {
                    alert('❌ 連線失敗：' + (data.error || '請檢查設定'));
                }
            } catch (error) {
                alert('❌ 連線失敗：' + error.message);
            }
        }

        // 建立活動
        async function createNewEvent() {
            if (!config.scriptUrl) {
                alert('請先設定 Apps Script 網址');
                return;
            }

            const name = document.getElementById('eventName').value;
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const location = document.getElementById('eventLocation').value;
            const note = document.getElementById('eventNote').value;

            if (!name || !date || !time) {
                alert('請填寫活動名稱、日期和時間');
                return;
            }

            const eventId = Date.now().toString();
            
            document.getElementById('createBtn').disabled = true;
            document.getElementById('createBtn').textContent = '建立中...';

            try {
                await appendToSheet('Events', [eventId, name, date, time, location, note]);
                
                setTimeout(() => {
                    generateQRCode(eventId, {id: eventId, name, date, time, location});
                }, 100);
                
                document.getElementById('eventName').value = '';
                document.getElementById('eventDate').value = '';
                document.getElementById('eventTime').value = '';
                document.getElementById('eventLocation').value = '';
                document.getElementById('eventNote').value = '';

                loadEventList();
                
                setTimeout(() => {
                    window.scrollTo({ 
                        top: document.getElementById('qrcode').offsetTop - 100, 
                        behavior: 'smooth' 
                    });
                }, 200);
            } catch (error) {
                alert('建立活動失敗：' + error.message);
            } finally {
                document.getElementById('createBtn').disabled = false;
                document.getElementById('createBtn').textContent = '建立活動並產生QR碼';
            }
        }

        // 寫入Google Sheets (透過 Apps Script) - 使用GET方式
        async function appendToSheet(sheetName, values) {
            // 將陣列轉為查詢字串
            const params = new URLSearchParams({
                action: 'append',
                sheet: sheetName,
                values: JSON.stringify(values)
            });
            
            const response = await fetch(`${config.scriptUrl}?${params.toString()}`);
            const data = await response.json();
            
            if (!data.success) {
                throw new Error(data.error || '寫入失敗');
            }

            return data;
        }

        // 讀取Google Sheets (透過 Apps Script)
        async function readFromSheet(sheetName) {
            const response = await fetch(
                `${config.scriptUrl}?sheet=${sheetName}`
            );

            const data = await response.json();
            
            if (!data.success) {
                throw new Error(data.error || '讀取失敗');
            }

            return data.data || [];
        }

        // 產生QR碼
        function generateQRCode(eventId, event) {
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '<h3>活動QR碼</h3><p>請將此QR碼提供給參與者掃描簽到</p>';
            
            const qrContainer = document.createElement('div');
            qrContainer.id = 'qr-container-' + eventId;
            qrcodeDiv.appendChild(qrContainer);

            // 使用簡短格式，並加入scriptUrl
            const eventData = `${event.id}|${event.name}|${event.date}|${event.time}|${event.location || ''}`;
            const encodedData = encodeURIComponent(eventData);
            const encodedScript = encodeURIComponent(config.scriptUrl);
            
            const currentUrl = window.location.href.split('?')[0];
            const qrUrl = `${currentUrl}?e=${encodedData}&s=${encodedScript}`;

            try {
                new QRCode(qrContainer, {
                    text: qrUrl,
                    width: 256,
                    height: 256,
                    colorDark: "#667eea",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });

                const urlInfo = document.createElement('p');
                urlInfo.style.fontSize = '12px';
                urlInfo.style.color = '#666';
                urlInfo.style.marginTop = '10px';
                urlInfo.style.wordBreak = 'break-all';
                urlInfo.innerHTML = `<strong>簽到網址:</strong><br><span style="font-size: 10px;">${qrUrl}</span>`;
                qrcodeDiv.appendChild(urlInfo);

                const downloadBtn = document.createElement('button');
                downloadBtn.textContent = '下載QR碼';
                downloadBtn.style.marginTop = '20px';
                downloadBtn.onclick = function() {
                    setTimeout(() => {
                        const canvas = qrContainer.querySelector('canvas');
                        if (canvas) {
                            const url = canvas.toDataURL('image/png');
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `QRCode_${event.name}.png`;
                            a.click();
                        }
                    }, 100);
                };
                qrcodeDiv.appendChild(downloadBtn);

                const copyBtn = document.createElement('button');
                copyBtn.textContent = '複製簽到連結';
                copyBtn.style.marginLeft = '10px';
                copyBtn.style.background = '#4caf50';
                copyBtn.onclick = function() {
                    navigator.clipboard.writeText(qrUrl).then(() => {
                        alert('連結已複製！');
                    });
                };
                qrcodeDiv.appendChild(copyBtn);
            } catch (error) {
                console.error('QR碼產生錯誤:', error);
                qrcodeDiv.innerHTML += '<p style="color: red;">QR碼產生失敗：' + error.message + '</p>';
            }
        }

        // 載入活動列表
        async function loadEventList() {
            if (!config.scriptUrl) return;

            document.getElementById('loadingEvents').style.display = 'block';
            
            try {
                const data = await readFromSheet('Events');
                allEvents = data.slice(1).map(row => ({
                    id: row[0],
                    name: row[1],
                    date: row[2],
                    time: row[3],
                    location: row[4] || '',
                    note: row[5] || ''
                }));

                const eventList = document.getElementById('eventList');
                eventList.innerHTML = '';

                if (allEvents.length === 0) {
                    eventList.innerHTML = '<p style="color: #666; padding: 20px;">目前沒有活動</p>';
                } else {
                    allEvents.forEach(event => {
                        const li = document.createElement('li');
                        li.className = 'event-item';
                        li.innerHTML = `
                            <div class="event-info">
                                <h3>${event.name}</h3>
                                <p>📅 ${event.date} ${event.time}${event.location ? ' | 📍 ' + event.location : ''}</p>
                            </div>
                            <div class="event-actions">
                                <button onclick='showQRCodeForEvent(${JSON.stringify(event).replace(/'/g, "&apos;")})'>顯示QR碼</button>
                            </div>
                        `;
                        eventList.appendChild(li);
                    });
                }

                updateStatsEventSelect();
            } catch (error) {
                console.error('載入活動失敗:', error);
                document.getElementById('eventList').innerHTML = '<p style="color: red; padding: 20px;">載入失敗：' + error.message + '</p>';
            } finally {
                document.getElementById('loadingEvents').style.display = 'none';
            }
        }

        // 顯示特定活動的QR碼
        function showQRCodeForEvent(event) {
            generateQRCode(event.id, event);
            window.scrollTo({ top: document.getElementById('qrcode').offsetTop - 100, behavior: 'smooth' });
        }

        // 切換標籤
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            if (tabName === 'checkin') {
                startScanner();
            } else if (html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
            
            if (tabName === 'stats') {
                loadStats();
            }
        }

        function showTabByName(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach((tab, index) => {
                if ((tabName === 'create' && index === 0) ||
                    (tabName === 'checkin' && index === 1) ||
                    (tabName === 'stats' && index === 2)) {
                    tab.classList.add('active');
                }
            });
            
            document.getElementById(tabName).classList.add('active');
        }

        // 啟動掃描器
        function startScanner() {
            const readerDiv = document.getElementById('reader');
            readerDiv.innerHTML = '';

            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { fps: 10, qrbox: 250 }
            );

            html5QrcodeScanner.render(onScanSuccess, onScanError);
        }

        function onScanSuccess(decodedText, decodedResult) {
            html5QrcodeScanner.clear();
            
            try {
                const url = new URL(decodedText);
                const params = new URLSearchParams(url.search);
                
                // 讀取並儲存scriptUrl
                if (params.has('s')) {
                    const urlScriptUrl = decodeURIComponent(params.get('s'));
                    if (urlScriptUrl) {
                        config.scriptUrl = urlScriptUrl;
                        localStorage.setItem('scriptUrl', urlScriptUrl);
                    }
                }
                
                if (params.has('e')) {
                    const eventData = decodeURIComponent(params.get('e'));
                    const parts = eventData.split('|');
                    
                    if (parts.length >= 4) {
                        currentEvent = {
                            id: parts[0],
                            name: parts[1],
                            date: parts[2],
                            time: parts[3],
                            location: parts[4] || ''
                        };
                        currentEventId = parts[0];
                        
                        document.getElementById('checkinEventName').innerHTML = `
                            <strong>${currentEvent.name}</strong><br>
                            <small style="color: #666;">📅 ${currentEvent.date} ${currentEvent.time}${currentEvent.location ? ' | 📍 ' + currentEvent.location : ''}</small>
                        `;
                        document.getElementById('checkinForm').style.display = 'block';
                        document.getElementById('reader').style.display = 'none';
                    } else {
                        showError('活動資訊格式錯誤');
                        setTimeout(resetScanner, 2000);
                    }
                } else {
                    showError('無效的QR碼格式');
                    setTimeout(resetScanner, 2000);
                }
            } catch (e) {
                console.error('掃描錯誤:', e);
                showError('無效的QR碼');
                setTimeout(resetScanner, 2000);
            }
        }

        function onScanError(errorMessage) {
            // 忽略掃描錯誤訊息
        }

        function resetScanner() {
            document.getElementById('checkinForm').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            document.getElementById('attendeeName').value = '';
            document.getElementById('attendeeUnit').value = '';
            document.getElementById('attendeeTitle').value = '';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            currentEventId = null;
            
            window.history.replaceState({}, document.title, window.location.pathname);
            
            startScanner();
        }

        // 提交簽到
        async function submitCheckin() {
            // 重新確認設定
            config.scriptUrl = localStorage.getItem('scriptUrl') || '';
            
            if (!config.scriptUrl) {
                alert('請先設定 Apps Script。\n\n請在電腦端開啟此網頁進行設定：\n' + window.location.origin + window.location.pathname);
                return;
            }

            const name = document.getElementById('attendeeName').value;
            if (!name) {
                alert('請輸入姓名');
                return;
            }

            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '簽到中...';

            try {
                const checkinId = Date.now().toString();
                //const timestamp = new Date().toISOString();
                // 取得台灣時間
                const now = new Date();
                const taiwanTime = new Date(now.getTime() + (8 * 60 * 60 * 1000)); // UTC+8
                const timestamp = taiwanTime.toISOString().replace('T', ' ').substring(0, 19);
                
                await appendToSheet('Checkins', [
                    checkinId,
                    currentEventId,
                    currentEvent.name,
                    name,
                    document.getElementById('attendeeUnit').value || '',
                    document.getElementById('attendeeTitle').value || '',
                    timestamp
                ]);

                showSuccess(`${name} 簽到成功！`);
                
                setTimeout(() => {
                    document.getElementById('attendeeName').value = '';
                    document.getElementById('attendeeUnit').value = '';
                    document.getElementById('attendeeTitle').value = '';
                    document.getElementById('successMessage').style.display = 'none';
                }, 2000);
            } catch (error) {
                showError('簽到失敗：' + error.message);
                console.error('簽到錯誤:', error);
            } finally {
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = '確認簽到';
            }
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // 載入統計
        async function loadStats() {
            if (!config.scriptUrl) {
                alert('請先設定 Apps Script');
                return;
            }

            document.getElementById('loadingStats').style.display = 'block';

            try {
                const data = await readFromSheet('Checkins');
                allCheckins = data.slice(1).map(row => ({
                    id: row[0],
                    eventId: row[1],
                    eventName: row[2],
                    name: row[3],
                    unit: row[4] || '',
                    title: row[5] || '',
                    timestamp: row[6]
                }));

                filterStats();
            } catch (error) {
                document.getElementById('statsContent').innerHTML = '<p style="color: red;">載入失敗：' + error.message + '</p>';
            } finally {
                document.getElementById('loadingStats').style.display = 'none';
            }
        }

        function updateStatsEventSelect() {
            const select = document.getElementById('statsEventSelect');
            select.innerHTML = '<option value="">所有活動</option>';
            
            allEvents.forEach(event => {
                const option = document.createElement('option');
                option.value = event.id;
                option.textContent = `${event.name} (${event.date})`;
                select.appendChild(option);
            });
        }

        function filterStats() {
            const eventId = document.getElementById('statsEventSelect').value;
            const statsContent = document.getElementById('statsContent');
            
            let filteredCheckins = eventId ? 
                allCheckins.filter(c => c.eventId === eventId) : 
                allCheckins;

            if (filteredCheckins.length === 0) {
                statsContent.innerHTML = '<p style="color: #666;">目前沒有簽到記錄</p>';
                return;
            }

            let html = `
                <div class="stats">
                    <div class="stat-card">
                        <h3>${filteredCheckins.length}</h3>
                        <p>總簽到人數</p>
                    </div>
                </div>

                <h3>${eventId ? '簽到明細' : '所有簽到記錄'}</h3>
                <table>
                    <thead>
                        <tr>
                            ${!eventId ? '<th>活動名稱</th>' : ''}
                            <th>姓名</th>
                            <th>單位</th>
                            <th>職稱</th>
                            <th>簽到時間</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            filteredCheckins.forEach(checkin => {
                // 處理時間顯示，支援兩種格式
                let displayTime = checkin.timestamp || '';
                if (checkin.timestamp && checkin.timestamp.includes('T')) {
                    // ISO格式：轉為台灣時間
                    const date = new Date(checkin.timestamp);
                    displayTime = new Date(date.getTime() + (8 * 60 * 60 * 1000)).toISOString().replace('T', ' ').substring(0, 19);
                }
                // 如果已經是 "YYYY-MM-DD HH:MM:SS" 格式就直接使用

                html += `
                <tr>
                    ${!eventId ? `<td>${checkin.eventName || ''}</td>` : ''}
                    <td>${checkin.name || ''}</td>
                    <td>${checkin.unit || '-'}</td>
                    <td>${checkin.title || '-'}</td>
                    <td>${displayTime}</td>
                </tr>
            `;
            });

            html += `
                    </tbody>
                </table>
                <button class="download-btn" onclick="downloadStatsCSV()">下載CSV報表</button>
            `;

            statsContent.innerHTML = html;
        }

        function downloadStatsCSV() {
            const eventId = document.getElementById('statsEventSelect').value;
            let filteredCheckins = eventId ? 
                allCheckins.filter(c => c.eventId === eventId) : 
                allCheckins;

            let csv = '\uFEFF';
            csv += '活動名稱,姓名,單位,職稱,簽到時間\n';

            filteredCheckins.forEach(checkin => {
                // 處理時間格式
                let displayTime = checkin.timestamp || '';
                if (checkin.timestamp && checkin.timestamp.includes('T')) {
                    const date = new Date(checkin.timestamp);
                    displayTime = new Date(date.getTime() + (8 * 60 * 60 * 1000)).toISOString().replace('T', ' ').substring(0, 19);
                }

                csv += `"${checkin.eventName}","${checkin.name}","${checkin.unit || ''}","${checkin.title || ''}","${displayTime}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `簽到記錄_${new Date().toLocaleDateString('zh-TW')}.csv`;
            link.click();
        }
    </script>
</body>
</html>

    <!--  Bootstrap Stylesheet -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <link href="css/style.css" rel="stylesheet">
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script>
        var TOKEN = '';
        var U_Permit = '';

        $(document).ready(function () {
            let s = location.href;
            sessionStorage.setItem("myURL", s);

            var chkURL = sessionStorage.getItem("chkURL");
            var url = parent.document.URL;

            if (chkURL == null) {
                window.location.href = './tjpzep_index.html';
                return;
            }
            if (url != chkURL) {
                window.location.href = './tjpzep_index.html';
                return;
            }

            initControll();
            getGalleryData('PROJECT');
        })

        function initControll()
        { }

        function getGalleryData(GALLERY_TYPE) {

            var dataOpener = "";
            
            var selectTitle = $('#selectTitle').val();
            var selectYear = $('#selectYear').val();
            var selectMonth = $('#selectMonth').val();

            var FUN_NAME = "GALLERY_QUERY";//必要參數 預存程序名稱
            var TYPE = "Q";//必要參數 類型 Q:查詢 I:新增  U:更新  L:登入取授權

            var PA = '{' +
              '"FUNCTION_NAME":"' + FUN_NAME + '","TYPE":"' + TYPE + '","PUBLIC":"1","IDX":"-999","GALLERY_TYPE":"' + GALLERY_TYPE + '"}';

            var TILTEs = [];


            $.ajax({
                url: './service.ashx',
                //url: 'https://tjpzep.sinotech.com.tw/SERVICE_TJPZEP/service.ashx',
                type: 'POST',
                data: PA,
                dataType: "json",
                success: function (dataJS) {
                    console.log(dataJS);
                    var dataArray = dataJS;

                    var Message_Code = dataArray.Message[0].Message_Code;
                    var Message_Content = dataArray.Message[0].Message_Content;
                    if (Message_Code == '1') {
                        var i = 0;
                        $.each(dataArray.Data, function (idx0, obj0) {
                            var GALLERY_TILTE_0 = obj0.GALLERY_TILTE;

                            if (selectTitle != "ALL" && GALLERY_TILTE_0 != selectTitle)
                            { return; }


                            let indexTILTE = TILTEs.indexOf(GALLERY_TILTE_0);
                            if (indexTILTE < 0) {
                                

                                dataOpener += " <h3>" + GALLERY_TILTE_0 + "</h3>";

                                var NOs = [];
                                $.each(dataArray.Data, function (idx1, obj1) {
                                    var GALLERY_TILTE_1 = obj1.GALLERY_TILTE;
                                    var GALLERY_NO_1 = obj1.GALLERY_NO;

                                    let indexNO = NOs.indexOf(GALLERY_NO_1);

                                    if (indexNO < 0 && GALLERY_TILTE_0 == GALLERY_TILTE_1) {
                                        i += 1;
                                        var GALLERY_NO_1 = obj1.GALLERY_NO;
                                        var GALLERY_DATE_1 = obj1.GALLERY_DATE.replace('T00:00:00', '');

                                        var MyDate = new Date(GALLERY_DATE_1);
                                        var year = MyDate.getFullYear();
                                        var month = MyDate.getMonth() + 1;
                                        var day = MyDate.getDate();

                                        if (selectYear != "ALL" && year != selectYear)
                                        { return; }

                                        if (selectMonth != "ALL" && month != selectMonth) {
                                            return;
                                        }

                                        
                                        dataOpener +=
                                                    "<div class='accordion-item' id='pic" + i.toString() + "'> " +
                                                    "  <h2 class='accordion-header' id='panelsStayOpen-heading" + i.toString() + "'>" +
                                                    "    <button class='accordion-button py-1 bg-primary' type='button' data-bs-toggle='collapse' data-bs-target='#panelsStayOpen-collapse" + i.toString() + "' aria-expanded='true' aria-controls='panelsStayOpen-collapse1'>" +
                                                    "        <p class='date me-2'>" + GALLERY_DATE_1 + "</p><h5 class='my-1 text-white'>照片說明</h5>" +
                                                    "    </button>" +
                                                    "  </h2>" +
                                                    "  <div id='panelsStayOpen-collapse" + i.toString() + "' class='accordion-collapse collapse show' aria-labelledby='panelsStayOpen-heading" + i.toString() + "'>" +
                                                    "    <div class='accordion-body'>" +
                                                    "       <div class='row gy-2'>";

                                                    var dataImage = "";
                                                    $.each(dataArray.Data, function (idx2, obj2) {
                                                        var GALLERY_TILTE_2 = obj2.GALLERY_TILTE;
                                                        var GALLERY_NO_2 = obj2.GALLERY_NO;
                                                        var GALLERY_FILE_NAME_2 = obj2.GALLERY_FILE_NAME;
                                                        var GALLERY_FILE_TITLE_2 = obj2.GALLERY_FILE_TITLE;
                                                        if (GALLERY_NO_1 == GALLERY_NO_2 && GALLERY_TILTE_1 == GALLERY_TILTE_2) {
                                                            dataImage += "<img class='col-sm-3' src='photo/" + GALLERY_FILE_NAME_2 + "' alt='" + GALLERY_FILE_TITLE_2 + "'>";
                                                        }
                                                    }); 
                                                    dataOpener += dataImage +
 
                                                    "       </div>" +
                                                    "    </div>" +
                                                    " </div>" +
                                                    "</div>";


                                        NOs.push(GALLERY_NO_1);
                                    }
                                });


                                TILTEs.push(GALLERY_TILTE_0);
                            }
                        });


                        $('#divData').html(dataOpener);

                    }
                    else {
                        alert(Message_Content);
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {

                    alert("Status: " + textStatus); alert("Error: " + errorThrown);
                }

            })

        }

        function cmd_Q() {
            getGalleryData('PROJECT');
        }
    </script>
</head>
<body>
    <div class="container-fluid mt-3 mb-3">
        <div class="container">
            <div class="row">
                <div class="col-12 wow zoomIn" data-wow-delay="0.1s">
                    <h2>施工影像</h2>
                    <!--查詢bar-->
                    <div class="row g-3 align-items-center mb-5">
                        <div class="col-auto">
                            <label for="inputPassword6" class="col-form-label">選擇工程</label>
                        </div>
                        <div class="col-auto">
                            <select class="form-select" aria-label=".form-select-lg"   id="selectTitle">
                                <option value="ALL" selected>全選</option>
                                <option value="整地工程">整地工程</option>
                                <option value="道路工程">道路工程</option>
                                <option value="排水工程">排水工程</option>
                                <option value="大地工程">大地工程</option>
                                <option value="污水下水道工程">污水下水道工程</option>
                                <option value="自來水管線工程">自來水管線工程</option>
                                <option value="公共照明工程">公共照明工程</option>
                                <option value="共同管道工程">共同管道工程</option>
                                <option value="公園綠地工程">公園綠地工程</option>
                                <option value="其他工程">其他工程</option>
                                <option value="工程招標協辦">工程招標協辦</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <label for="inputPassword6" class="col-form-label">選擇年份</label>
                        </div>
                        <div class="col-auto">
                            <select class="form-select" aria-label=".form-select-lg"  id="selectYear">
                                <option value="ALL" selected>全選</option>
                                <option value="2024">2024年</option>
                                <option value="2023">2023年</option>
                                <option value="2022">2022年</option>
                                <option value="2021">2021年</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <label for="inputPassword6" class="col-form-label">選擇月份</label>
                        </div>
                        <div class="col-auto">
                            <select class="form-select" aria-label=".form-select-lg"  id="selectMonth">
                                <option value="ALL" selected>全選</option>
                                <option value="12">12月</option>
                                <option value="11">11月</option>
                                <option value="10">10月</option>
                                <option value="9">9月</option>
                                <option value="8">8月</option>
                                <option value="7">7月</option>
                                <option value="6">6月</option>
                                <option value="5">5月</option>
                                <option value="4">4月</option>
                                <option value="3">3月</option>
                                <option value="2">2月</option>
                                <option value="1">1月</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-primary"  onclick="cmd_Q()">查詢</button>
                        </div>
                    </div>
                    <div id="divData">
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="lib/wow/wow.min.js"></script>

    <script src="lib/twentytwenty/jquery.event.move.js"></script>
    <script src="lib/twentytwenty/jquery.twentytwenty.js"></script>

    <script src="js/main.js"></script>
</body>
